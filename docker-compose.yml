services:
  # ── Backend ───────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: newsletter_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
    ports:
      - "6314:5000"
    networks:
      - newsletter_net

  # ── Frontend ──────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
    container_name: newsletter_frontend
    restart: unless-stopped
    ports:
      - "3323:3000"
    depends_on:
      - backend
    networks:
      - newsletter_net

networks:
  newsletter_net:
    driver: bridge