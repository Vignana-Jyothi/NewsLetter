name: CI/CD — Newsletter

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main
      - develop

env:
  NODE_VERSION: 20

jobs:

################################################################################
# Select Environment
################################################################################

  setup:
    name: Setup Deployment Variables

    runs-on: ubuntu-latest

    outputs:
      runner: ${{ steps.vars.outputs.runner }}
      # environment: ${{ steps.vars.outputs.environment }}
      compose: ${{ steps.vars.outputs.compose }}

    steps:

      - id: vars

        run: |

          if [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            echo "runner=gamma" >> $GITHUB_OUTPUT
            echo "environment=Production" >> $GITHUB_OUTPUT
            echo "compose=docker-compose.prod.yml" >> $GITHUB_OUTPUT
          else
            echo "runner=dev-ai" >> $GITHUB_OUTPUT
            echo "environment=Development" >> $GITHUB_OUTPUT
            echo "compose=docker-compose.dev.yml" >> $GITHUB_OUTPUT
          fi

###############################################################################
# Backend Lint
###############################################################################

  backend-lint:

    name: Backend Lint

    needs: setup

    runs-on: 
      - self-hosted
      - ${{ needs.setup.outputs.runner }}

    # environment: ${{ needs.setup.outputs.environment }}

    defaults:
      run:
        working-directory: Backend

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: Backend/package-lock.json

      - run: npm ci

      - run: npm run lint --if-present
        continue-on-error: true

###############################################################################
# Frontend Lint
###############################################################################

  frontend-lint-build:

    name: Frontend Lint & Build

    needs:
      - setup
      - backend-lint

    runs-on: 
      - self-hosted
      - ${{ needs.setup.outputs.runner }}

    # environment: ${{ needs.setup.outputs.environment }}

    defaults:
      run:
        working-directory: Frontend

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: Frontend/package-lock.json

      - run: npm ci

      - run: npm run lint
        continue-on-error: true

      - name: Validate Secrets

        run: |

          test -n "${{ secrets.VITE_API_URL }}" || exit 1
          test -n "${{ secrets.VITE_AUTH_URL }}" || exit 1
          test -n "${{ secrets.VITE_GOOGLE_CLIENT_ID }}" || exit 1

      - name: Build Frontend

        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_AUTH_URL: ${{ secrets.VITE_AUTH_URL }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}

        run: npm run build

###############################################################################
# Docker Deploy
###############################################################################

  deploy:

    name: Docker Deploy

    needs:
      - setup
      - backend-lint
      - frontend-lint-build

    if: github.event_name == 'push'

    runs-on:
      - self-hosted
      - ${{ needs.setup.outputs.runner }}

    # environment: ${{ needs.setup.outputs.environment }}

    steps:

      - uses: actions/checkout@v4

      - name: Verify Docker

        run: |

          docker --version
          docker compose version

      - name: Create .env

        run: |

          cat > .env <<EOF

          PORT=5000

          DB_HOST=${{ secrets.DB_HOST }}
          DB_PORT=${{ secrets.DB_PORT }}
          DB_NAME=${{ secrets.DB_NAME }}
          DB_USER=${{ secrets.DB_USER }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}

          JWT_SECRET=${{ secrets.JWT_SECRET }}

          GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}

          ADMIN_DEV_KEY=${{ secrets.ADMIN_DEV_KEY }}
          ADMIN_EMAILS=${{ secrets.ADMIN_EMAILS }}
          ALLOWED_EMAIL_DOMAIN=${{ secrets.ALLOWED_EMAIL_DOMAIN }}

          SMTP_HOST=${{ secrets.SMTP_HOST }}
          SMTP_PORT=${{ secrets.SMTP_PORT }}
          SMTP_USER=${{ secrets.SMTP_USER }}
          SMTP_PASS=${{ secrets.SMTP_PASS }}

          EMAIL_FROM=${{ secrets.EMAIL_FROM }}

          FRONTEND_URL=${{ secrets.FRONTEND_URL }}

          DEV_MODE=${{ secrets.DEV_MODE }}
          UPLOAD_DIR=${{ secrets.UPLOAD_DIR }}

          VITE_API_URL=${{ secrets.VITE_API_URL }}
          VITE_AUTH_URL=${{ secrets.VITE_AUTH_URL }}
          VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}

          EOF

      - name: Stop Existing Containers

        run: |

          docker compose \
          -f ${{ needs.setup.outputs.compose }} \
          down --remove-orphans || true

      - name: Build Containers

        run: |

          docker compose \
          -f ${{ needs.setup.outputs.compose }} \
          build

      - name: Start Containers

        run: |

          docker compose \
          -f ${{ needs.setup.outputs.compose }} \
          up -d

      - name: Show Containers

        run: |

          docker compose \
          -f ${{ needs.setup.outputs.compose }} \
          ps

      - name: Backend Logs

        run: |

          docker logs newsletter_backend --tail=50 || true

      - name: Frontend Logs

        run: |

          docker logs newsletter_frontend --tail=50 || true