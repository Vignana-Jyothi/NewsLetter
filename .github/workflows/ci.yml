name: CI/CD — Newsletter

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  # -------------------------------------------------------
  # Backend Lint
  # -------------------------------------------------------
  backend-lint:
    name: Backend Lint
    runs-on: gamma

    defaults:
      run:
        working-directory: Backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present
        continue-on-error: true

  # -------------------------------------------------------
  # Frontend Lint & Build
  # -------------------------------------------------------
  frontend-lint-build:
    name: Frontend Lint & Build
    runs-on: gamma
    needs: backend-lint

    defaults:
      run:
        working-directory: Frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_AUTH_URL: ${{ secrets.VITE_AUTH_URL }}
        run: npm run build

  # -------------------------------------------------------
  # Docker Deploy
  # -------------------------------------------------------
  deploy:
    name: Docker Deploy
    runs-on: gamma

    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    needs:
      - backend-lint
      - frontend-lint-build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Docker
        run: |
          docker --version
          docker compose version

      - name: Create .env
        run: |
          cat > .env <<EOF
          PORT=5000

          DB_HOST=${{ secrets.DB_HOST }}
          DB_PORT=${{ secrets.DB_PORT }}
          DB_NAME=${{ secrets.DB_NAME }}
          DB_USER=${{ secrets.DB_USER }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}

          JWT_SECRET=${{ secrets.JWT_SECRET }}

          GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}

          ADMIN_DEV_KEY=${{ secrets.ADMIN_DEV_KEY }}
          ADMIN_EMAILS=${{ secrets.ADMIN_EMAILS }}
          ALLOWED_EMAIL_DOMAIN=${{ secrets.ALLOWED_EMAIL_DOMAIN }}

          SMTP_HOST=${{ secrets.SMTP_HOST }}
          SMTP_PORT=${{ secrets.SMTP_PORT }}
          SMTP_USER=${{ secrets.SMTP_USER }}
          SMTP_PASS=${{ secrets.SMTP_PASS }}

          EMAIL_FROM=${{ secrets.EMAIL_FROM }}
          FRONTEND_URL=${{ secrets.FRONTEND_URL }}

          DEV_MODE=${{ secrets.DEV_MODE }}
          UPLOAD_DIR=${{ secrets.UPLOAD_DIR }}

          VITE_API_URL=${{ secrets.VITE_API_URL }}
          VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_AUTH_URL=${{ secrets.VITE_AUTH_URL }}
          EOF

      - name: Stop old containers
        run: |
          docker compose down --remove-orphans || true

      - name: Remove old images
        run: |
          docker image prune -af || true

      - name: Build Docker Images
        run: |
          docker compose build --no-cache

      - name: Start Containers
        run: |
          docker compose up -d

      - name: Show Running Containers
        run: |
          docker compose ps

      - name: Backend Logs
        run: |
          docker logs newsletter_backend --tail 50 || true

      - name: Frontend Logs
        run: |
          docker logs newsletter_frontend --tail 50 || true