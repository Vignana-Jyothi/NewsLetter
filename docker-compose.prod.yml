version: "3.9"

services:

  backend:
    container_name: newsletter_backend

    build:
      context: ./Backend
      dockerfile: Dockerfile

    restart: unless-stopped

    env_file:
      - .env

    environment:
      NODE_ENV: production

    ports:
      - "6314:5000"

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

    networks:
      - newsletter_net

  frontend:
    container_name: newsletter_frontend

    build:
      context: ./Frontend
      dockerfile: Dockerfile

      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_AUTH_URL: ${VITE_AUTH_URL}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID}

    restart: unless-stopped

    depends_on:
      backend:
        condition: service_started

    ports:
      - "3323:80"

    networks:
      - newsletter_net

networks:
  newsletter_net:
    driver: bridge